<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Pawsure</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,400..800;1,400..800&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Allow scroll if screen is too small for this longer form, but try to fit */
            background-color: var(--bg-surface-alt);
            padding: 24px 0;
        }

        .auth-card {
            background-color: var(--bg-body);
            padding: 48px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--color-primary);
            margin-bottom: 24px;
            text-decoration: none;
        }

        .auth-logo:hover {
            color: var(--color-primary);
            text-decoration: none;
        }

        .auth-logo i {
            color: var(--color-primary);
        }

        .social-auth {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .btn-social {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: var(--bg-body);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 100%;
        }

        .btn-social:hover {
            background-color: var(--bg-surface-alt);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: var(--size-caption);
            margin-bottom: 24px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider::before {
            margin-right: 16px;
        }

        .divider::after {
            margin-left: 16px;
        }

        .auth-footer {
            margin-top: 24px;
            color: var(--text-muted);
            font-size: var(--size-caption);
        }

        .auth-footer a {
            color: var(--color-primary);
            font-weight: bold;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            text-align: left;
            margin-bottom: 24px;
            font-size: var(--size-caption);
        }

        .checkbox-group input {
            margin-top: 4px;
            accent-color: var(--color-primary);
        }

        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper .form-control {
            padding-right: 48px;
        }

        html[dir="rtl"] .password-wrapper .form-control {
            padding-right: 16px;
            padding-left: 48px;
        }

        .password-toggle-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            transition: color var(--transition-fast);
            z-index: 10;
        }

        .password-toggle-btn:hover {
            color: var(--color-primary);
        }

        html[dir="rtl"] .password-toggle-btn {
            right: auto;
            left: 16px;
        }

        /* Top corner theme/RTL actions */
        .auth-actions {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        html[dir="rtl"] .auth-actions {
            right: auto;
            left: 24px;
        }

        @media (max-width: 480px) {
            body {
                flex-direction: column;
                justify-content: flex-start;
                align-items: center;
                padding: 72px 16px 40px 16px;
                overflow-y: auto;
            }

            .auth-actions {
                position: absolute;
                top: 16px;
                right: 16px;
                display: flex;
                gap: 12px;
                z-index: 100;
            }

            html[dir="rtl"] .auth-actions {
                right: auto;
                left: 16px;
            }

            .auth-card {
                padding: 32px 20px;
                margin-top: 0;
            }
        }
    </style>
</head>

<body>

    <div class="auth-actions">
        <button class="icon-btn theme-toggle" aria-label="Toggle Dark Mode">
            <div class="theme-icon">
                <i class="ph ph-sun icon-sun"></i>
                <i class="ph ph-moon icon-moon"></i>
            </div>
        </button>
        <button class="icon-btn rtl-toggle" aria-label="Toggle RTL">
            <i class="ph ph-arrows-left-right"></i>
        </button>
    </div>

    <div class="auth-card fade-up">
        <a href="index.html" class="auth-logo">
            <i class="ph-fill ph-paw-print"></i>
            Pawsure
        </a>

        <h2 style="font-size: var(--size-h3); margin-bottom: 24px;">Create an Account</h2>

        <form class="needs-validation" novalidate action="dashboard.html">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" name="name" required>
                <div class="error-message">Please enter your name.</div>
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" name="email" required
                    pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">
                <div class="error-message">Please enter a valid email address.</div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" name="password" required minlength="8">
                    <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                        <i class="ph ph-eye"></i>
                    </button>
                </div>
                <div class="error-message">Password must be at least 8 characters.</div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" name="confirmPassword" required minlength="8">
                    <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                        <i class="ph ph-eye"></i>
                    </button>
                </div>
                <div class="error-message">Passwords must match.</div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I accept the <a href="#" style="color: var(--color-primary);">Terms & Conditions</a>
                    and <a href="#" style="color: var(--color-primary);">Privacy Policy</a>.</label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
        </form>

        <div class="divider">OR</div>

        <div class="social-auth">
            <button class="btn btn-social">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" />
                </svg>
                Continue with Google
            </button>
            <button class="btn btn-social">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path
                        d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.12.09 2.27-.58 2.95-1.39z" />
                </svg>
                Continue with Apple
            </button>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/dashboard.js"></script>
    <script>
        document.querySelectorAll('.password-toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const wrapper = btn.closest('.password-wrapper');
                const input = wrapper.querySelector('input');
                const icon = btn.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.className = 'ph ph-eye-slash';
                } else {
                    input.type = 'password';
                    icon.className = 'ph ph-eye';
                }
            });
        });
    </script>
</body>

</html>
